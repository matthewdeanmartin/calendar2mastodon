---
name: Calendar Reminder
on:
  schedule:
    - cron: "30 11 * * *" # 6:30am EST (UTC-5, Nov–Mar)
    - cron: "30 10 * * *" # 6:30am EDT (UTC-4, Mar–Nov)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - uses: hynek/setup-cached-uv@4300ec2180bc77d705e626a34e381b81a4772c51 # v2.5.0

      - name: Restore reminder state
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/calendar2mastodon
          key: reminder-state-${{ runner.os }}

      - name: Install (no dev deps)
        run: uv sync --no-dev

      - name: Run reminders
        env:
          ICAL_URL: ${{ secrets.ICAL_URL }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: uv run calendar2mastodon

      - name: Save reminder state
        if: always()
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/calendar2mastodon
          key: reminder-state-${{ runner.os }}
